version: '3.8'

services:
  # Oracle Data Migration Validator Application
  migration-validator:
    build: .
    container_name: migration-validator
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=oracle-db
      - DB_PORT=1521
      - DB_SID=XE
      - DB_USERNAME=migration_user
      - DB_PASSWORD=migration_password
      - JAVA_OPTS=-Xmx2g -Xms1g -XX:+UseG1GC
    depends_on:
      - oracle-db
    networks:
      - migration-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Oracle Database (for development/testing)
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=OraclePassword123
      - APP_USER=migration_user
      - APP_USER_PASSWORD=migration_password
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts:/docker-entrypoint-initdb.d
    networks:
      - migration-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/OraclePassword123@localhost:1521/XE", "as", "sysdba", "<<<", "SELECT 1 FROM DUAL;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - migration-network
    restart: unless-stopped

  # Monitoring with Grafana (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - migration-network
    restart: unless-stopped

volumes:
  oracle-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  migration-network:
    driver: bridge