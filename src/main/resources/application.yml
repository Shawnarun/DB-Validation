spring:
  application:
    name: oracle-data-migration-validator
  
  # Enable virtual threads globally (Spring Boot 3.2+)
  threads:
    virtual:
      enabled: true
  
  datasource:
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}:${DB_SID:XE}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 1800000
      maximum-pool-size: 20
      minimum-idle: 5
      # Oracle specific settings to handle serialization issues
      data-source-properties:
        oracle.jdbc.defaultConnectionTimeout: 60000
        oracle.jdbc.ReadTimeout: 300000
        oracle.net.CONNECT_TIMEOUT: 60000
        oracle.jdbc.autoCommitSpecCompliant: false
        # Set transaction isolation to READ_COMMITTED to avoid ORA-08177
        defaultTransactionIsolation: 2  # READ_COMMITTED
        
  batch:
    job:
      enabled: false # Don't auto-start jobs
    jdbc:
      initialize-schema: always
      isolation-level-for-create: read_committed
      
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    
  # Transaction configuration
  transaction:
    default-timeout: 300
    rollback-on-commit-failure: true
    
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,batch
  endpoint:
    health:
      show-details: always

# Application specific configurations
migration:
  validation:
    batch-size: 1000
    chunk-size: 100
    # Higher thread pool size for virtual threads (lightweight)
    thread-pool-size: 20
    skip-limit: 10
    restart-on-error: true
    # Retry configuration for transient errors
    max-retry-attempts: 3
    retry-backoff-delay: 2000
    # Virtual thread specific optimizations
    virtual-threads:
      enabled: true
      max-concurrent-validations: 100
    
logging:
  level:
    com.oracle.migration: DEBUG
    org.springframework.batch: INFO
    org.springframework.jdbc: DEBUG
    org.springframework.transaction: DEBUG
    root: INFO
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/migration-validator.log
    max-size: 100MB
    max-history: 30