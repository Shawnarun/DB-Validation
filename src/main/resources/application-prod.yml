spring:
  application:
    name: oracle-data-migration-validator
  
  # Enable virtual threads globally (Spring Boot 3.2+)
  threads:
    virtual:
      enabled: true
  
  datasource:
    # Production database connection with environment variables
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}:${DB_SID:XE}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
    
    # Connection pool settings optimized for production
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 20
      minimum-idle: 5
      leak-detection-threshold: 60000
      
      # Oracle specific settings to handle serialization issues
      data-source-properties:
        oracle.jdbc.defaultConnectionTimeout: 30000
        oracle.jdbc.ReadTimeout: 300000
        oracle.net.CONNECT_TIMEOUT: 30000
        oracle.jdbc.autoCommitSpecCompliant: false
        # Set transaction isolation to READ_COMMITTED to avoid ORA-08177
        defaultTransactionIsolation: 2  # READ_COMMITTED
        # Additional Oracle optimizations
        oracle.jdbc.implicitStatementCacheSize: 25
        oracle.jdbc.defaultExecuteBatch: 50
        
  batch:
    job:
      enabled: false # Don't auto-start jobs
    jdbc:
      initialize-schema: always
      isolation-level-for-create: read_committed
      
  jpa:
    hibernate:
      ddl-auto: validate  # Use validate in production
    show-sql: false
    database-platform: org.hibernate.dialect.OracleDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        # Oracle specific configurations
        connection.characterEncoding: utf8
        connection.useUnicode: true
        format_sql: false
        globally_quoted_identifiers: true
        # Batch processing optimizations
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
        jdbc.batch_versioned_data: true
        # Connection handling
        connection.provider_disables_autocommit: true
        connection.autocommit: false
    
  # Transaction configuration
  transaction:
    default-timeout: 300
    rollback-on-commit-failure: true
    
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,batch
  endpoint:
    health:
      show-details: when-authorized
      
  health:
    db:
      enabled: true
    defaults:
      enabled: true

# Application specific configurations
migration:
  validation:
    batch-size: 1000
    chunk-size: 100
    # Higher thread pool size for virtual threads (lightweight)
    thread-pool-size: 20
    skip-limit: 10
    restart-on-error: true
    # Retry configuration for transient errors
    max-retry-attempts: 5
    retry-backoff-delay: 3000
    # Virtual thread specific optimizations
    virtual-threads:
      enabled: true
      max-concurrent-validations: 100
    
logging:
  level:
    com.oracle.migration: INFO
    org.springframework.batch: WARN
    org.springframework.jdbc: WARN
    org.springframework.transaction: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
    root: INFO
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/migration-validator.log
    max-size: 100MB
    max-history: 30