spring:
  application:
    name: oracle-data-migration-validator-test
  
  datasource:
    url: jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  h2:
    console:
      enabled: true
      
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
      
migration:
  validation:
    batch-size: 10
    chunk-size: 5
    thread-pool-size: 2
    skip-limit: 2
    restart-on-error: true
    
logging:
  level:
    com.oracle.migration: DEBUG
    org.springframework.batch: DEBUG
    root: INFO